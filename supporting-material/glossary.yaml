source:
  publication: "UK digital verification services trust framework 1.0"
  section: "16. Glossary of terms and definitions"

terms:
  - term: "Accreditation"
    definition: "The independent, third-party evaluation of a conformity assessment body against recognised standards, conveying formal demonstration of its impartiality and competence to carry out specific conformity assessment tasks."
  - term: "Anonymisation"
    definition: "Transforming personal data in such a way that individuals are not, or no longer are, identifiable."
  - term: "Attribute"
    definition: "A piece of information that describes something about a person or an organisation. A combination of attributes can be used to create a digital identity."
  - term: "Attribute service provider"
    definition: "An organisation providing a service that collects, creates, checks or shares pieces of information that describe something about a user."
  - term: "Audit"
    definition: "The independent verification activity, such as inspection or examination of a product, process or service to ensure compliance to requirements."
  - term: "Authenticator"
    definition: "Something that users can use to access a service. It could be some information (like a password), a piece of software or a device."
  - term: "Biometric information"
    definition: "Measurements of a biological or behavioural attribute, like an iris or fingerprint"
  - term: "Certification"
    definition: "Represents a written assurance by an independent third-party, accredited by the [UK Accreditation Service (UKAS)](https://www.ukas.com/about-us/), of the conformity of a product, process or service to specified requirements."
  - term: "Certified service"
    definition: "A digital verification service that has been certified against the trust framework."
  - term: "Component service provider"
    definition: "An organisation providing a service that specialises in designing and building components that can be used during part(s) of the identity checking or authentication processes."
  - term: "Compromised account"
    definition: "An account has been compromised if a threat actor has accessed it. This could happen because someone has been a victim of coercion, social engineering, phishing or other cyber attacks."
  - term: "Conformity assessment body (CAB)"
    definition: "A body accredited by the UK Accreditation Service (UKAS) to certify a product, process or service to specified requirements. [Approved trust framework conformity assessment bodies](https://www.gov.uk/guidance/list-of-approved-conformity-assessment-bodies) are accredited to undertake certification against the trust framework in keeping with [ISO/IEC 17065](https://www.iso.org/standard/46568.html)."
  - term: "Contra-indicators"
    definition: "A way of categorising any wrong or contradictory information that you might get from, or about, users."
  - term: "Credential"
    definition: "A collection of attributes that can be used to confirm a person or organisation’s suitability to undertake activities or prove things about themselves."
  - term: "Cryptography"
    definition: "Technologies primarily based on maths and computer science for protecting information so that it is only accessible to authorised recipients."
  - term: "Data minimisation"
    definition: "Processing the minimum amount of personal data needed to deliver an individual element of a service."
  - term: "Data protection legislation"
    definition: "The [UK General Data Protection Regulation](https://www.legislation.gov.uk/eur/2016/679/contents)(UK GDPR), the [Data Protection Act 2018](https://www.legislation.gov.uk/ukpga/2018/12/section/3#commentary-key-542d243b9191f7169b7009b1177f80e5) and regulations made under the Data Protection Act or the UK GDPR."
  - term: "Data schema"
    definition: "Provides [guidance for certified services and relying parties](https://www.gov.uk/government/publications/uk-digital-verification-services-trust-framework-data-schema-1-0) on how to organise and exchange information in a consistent way to enable interoperability. It describes the outcomes of different identity verification processes outlined in GPG 45 and GPG 44 in a machine-readable format."
  - term: "Delegated authority"
    definition: "When a user is authorised to act on behalf of someone else."
  - term: "Digital identity"
    definition: "A digital representation of who a user is. It lets them prove who they are during interactions and transactions. They can use it online or in person."
  - term: "Digital verification service (DVS)"
    definition: "Services that enable people to digitally prove who they are, information about themselves or their eligibility to do something."
  - term: "Digital wallet"
    definition: "A user-facing app, commonly used on mobile phones, to securely hold and share digital information such as payment card details or tickets, as well as identity and/or attribute information."
  - term: "Electronic signature"
    definition: "Data in electronic form which is attached to or logically associated with data in electronic form, and which is used by the signatory to sign."
  - term: "Encryption"
    definition: "A mathematical function that encodes data in such a way that only authorised users can access it."
  - term: "False match"
    definition: "When a user is matched by a biometric system to the record of someone who is not them."
  - term: "False non-match"
    definition: "When a biometric system fails to match a user to their own record."
  - term: "Firewall"
    definition: "A network security system that monitors and controls incoming and outgoing network traffic."
  - term: "Hash function"
    definition: "When data is converted into a fixed-length value. A hash cannot be reversed to reveal the original data."
  - term: "Holder service account"
    definition: "A user interface that allows a user to consistently access, manage and protect information held in their holder service. It also allows a provider to directly support and remotely manage a user’s holder service."
  - term: "Holder service provider"
    definition: "An organisation that creates a user-facing device, service, software or app that allows a user to collect, store, view, manage or share their identity and/or attribute information."
  - term: "Identifier"
    definition: "A piece of information that can be used to make a connection between an attribute and a person."
  - term: "Identity repair"
    definition: "A process that makes it possible for a user to use their rightful identity after experiencing identity theft."
  - term: "Identity service provider"
    definition: "An organisation providing a service that checks a user’s identity for one-off use at a single point in time. It can do this using online or offline channels, or a combination of both."
  - term: "Industry standards"
    definition: "Relevant established standards from organisations including but not limited to ISO/IEC, ITU, ETSI, ENISA, ANSI, NIST, BSI."
  - term: "Internet Protocol (IP) address"
    definition: "A numerical label assigned to any device connected to a computer network that uses Internet Protocol."
  - term: "Intrusion detection system"
    definition: "Software that automatically looks for possible incidents during events in a computer system or network."
  - term: "The register of digital identity and attribute services"
    definition: "A public, managed list of providers with services certified against the trust framework that is maintained by OfDIA."
  - term: "Metadata"
    definition: "Data that provides information about other data."
  - term: "Orchestration service provider"
    definition: "An organisation providing a service that makes sure data can be securely shared between participants in the trust framework through the provision of their technology infrastructure."
  - term: "Participant"
    definition: "A collective term to refer to all organisations that interact with the trust framework and participate in the wider digital identity and attributes market. This includes certified services and relying parties."
  - term: "Personal data"
    definition: "Any information relating to an identified or identifiable natural person"
  - term: "Personal data store"
    definition: "A service which lets an individual store, manage and deploy their key personal data in a highly secure and structured way."
  - term: "Phishing"
    definition: "An attempt to trick users into submitting personal information by asking them to click on links within, for example, scam emails or text messages."
  - term: "Provider"
    definition: "An organisation that offers digital verification services. Where a provider has had their service certified against the trust framework, we refer to it as a ‘certified service’."
  - term: "Pseudonymisation"
    definition: "A security technique that replaces or removes information in a data set that identifies an individual. It does not change the status of the data as personal data ([ICO Guidance](https://ico.org.uk/for-organisations/guide-to-data-protection/guide-to-the-general-data-protection-regulation-gdpr/what-is-personal-data/what-is-personal-data/))."
  - term: "Qualified trust service"
    definition: "A service offered by a [qualified trust service provider](https://ico.org.uk/for-organisations/guide-to-eidas/qualified-trust-services/) that meets the rules in the UK electronic identification and trust services for electronic transactions (eIDAS) regulation (assimilated direct legislation)."
  - term: "Relying party"
    definition: "An organisation that relies on (or ‘consumes’) certified products or services."
  - term: "Relying party flow down terms"
    definition: "Terms included in contractual arrangements between certified services and relying parties."
  - term: "Shared signals"
    definition: "When intelligence is shared across the trust framework to reduce the impact of fraud on its participants and users."
  - term: "Supplementary code"
    definition: "A set of additional rules that DVS can certify against, in addition to the trust framework’s rules, to demonstrate that they meet the requirements of a particular sector or use case."
  - term: "Trust framework"
    definition: "A set of rules, which multiple parties can follow to share identities and attributes in a trusted way. This document, the UK DVS trust framework, is designed to help people use and reuse trustworthy digital identities and attributes with people and organisations across the United Kingdom and internationally. ‘Trust framework’ is used throughout the document itself to refer to the UK DVS trust framework."
  - term: "UK Accreditation Service (UKAS)"
    definition: "[UKAS is the national accreditation body for the UK](https://www.ukas.com/about-us/). Accreditation bodies are appointed by the Government to assess and accredit organisations that provide certification services."
  - term: "The UK digital identity trust mark"
    definition: "A unique visual mark that signals to users and relying parties that a service is certified against the trust framework and listed on the register of digital identity and attribute services."
  - term: "Unique identifier"
    definition: "Unique data used to represent someone’s identity and associated attributes."
  - term: "User"
    definition: "A person who uses digital verification services to prove something about themself. This can include people with delegated authority to act on behalf of somebody else, such as carers or parents."
  - term: "Verifiable credential"
    definition: "A specific kind of tamper-resistant credential that has been digitally signed to allow for its authorship to be cryptographically verified."

