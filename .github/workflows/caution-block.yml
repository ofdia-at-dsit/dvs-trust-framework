name: Caution block integrity

on:
  pull_request:
    paths:
      - "**/*.md"
  push:
    branches: [main]
    paths:
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  caution-block:
    name: Every Markdown file starts with the standard caution block
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check every .md begins with the caution block
        shell: bash
        run: |
          set -euo pipefail

          read -r -d '' EXPECTED_LINE1 <<'EOF' || true
          > [!CAUTION]
          EOF

          read -r -d '' EXPECTED_LINE2 <<'EOF' || true
          > This repository is a workspace copy for navigation, drafting, version control and collaboration. It is not the official statement of government policy and must not be relied on as such. For the official published policy, see the [UK digital verification services trust framework 1.0 on GOV.UK](https://www.gov.uk/government/publications/uk-digital-verification-services-trust-framework-1-0/uk-digital-verification-services-trust-framework-1-0-pre-release).
          EOF

          fail=0
          while IFS= read -r -d '' f; do
            # Skip anything under .github/ (templates, workflow descriptions, CODEOWNERS)
            # — those are tooling, not workspace content.
            # Skip docs-site/README.md and anything under docs-site/node_modules/
            # — site tooling, not workspace content.
            case "$f" in
              ./.github/*) continue ;;
              ./docs-site/README.md) continue ;;
              ./docs-site/node_modules/*) continue ;;
            esac

            line1=$(sed -n '1p' "$f")
            line2=$(sed -n '2p' "$f")
            line3=$(sed -n '3p' "$f")

            if [ "$line1" != "$EXPECTED_LINE1" ] || [ "$line2" != "$EXPECTED_LINE2" ] || [ -n "$line3" ]; then
              echo "::error file=$f::Missing or malformed caution block"
              echo "  expected line 1: $EXPECTED_LINE1"
              echo "  expected line 2: $EXPECTED_LINE2"
              echo "  expected line 3: (empty)"
              echo "  got line 1: $line1"
              echo "  got line 2: $line2"
              echo "  got line 3: $line3"
              fail=1
            fi
          done < <(find . -type f -name "*.md" -print0)

          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "One or more Markdown files are missing the required caution block."
            echo "See CONTRIBUTING.md — every Markdown file in the workspace must start with the caution block."
            exit 1
          fi
          echo "All Markdown files carry the caution block."
