<section aria-label="Service information" class="govuk-service-navigation" data-module="govuk-service-navigation">
  <div class="govuk-width-container">
    <div class="govuk-service-navigation__container">
      <nav aria-label="Menu" class="govuk-service-navigation__wrapper">
        <button type="button" class="govuk-service-navigation__toggle govuk-js-service-navigation-toggle" aria-controls="navigation" hidden>
          Menu
        </button>
        <ul class="govuk-service-navigation__list" id="navigation">
          {% for item in site.service_navigation %}
          <li class="govuk-service-navigation__item">
            <a class="govuk-service-navigation__link" href="{% if item.href contains '://' %}{{ item.href }}{% else %}{{ site.baseurl }}{{ item.href }}{% endif %}">
              {{ item.label }}
            </a>
          </li>
          {% endfor %}
        </ul>
      </nav>
    </div>
  </div>
</section>
