<hr class="govuk-section-break govuk-section-break--l govuk-section-break--visible">

<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">
    <h2 class="govuk-heading-m">Help improve this page</h2>
    <p class="govuk-body">
      This is a workspace copy of the publication. For the official policy, see the
      <a class="govuk-link" href="{{ site.govuk_publication_url }}">UK digital verification services trust framework 1.0 on GOV.UK</a>.
    </p>
    <ul class="govuk-list">
      {% if page.inputPath %}
      <li>
        <a class="govuk-link"
           href="{{ site.repo.url }}/blob/main/{{ page.inputPath | remove_first: './' }}">
          Edit this page on GitHub
        </a>
      </li>
      <li>
        <a class="govuk-link"
           href="{{ site.repo.url }}/issues/new/choose">
          Raise an issue about this page
        </a>
      </li>
      {% endif %}
    </ul>
  </div>
</div>
